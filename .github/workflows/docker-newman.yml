name: Lab04 Docker and Newman Verification

on:
  push:
  pull_request:

jobs:
  docker-newman:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Node dependencies
        run: npm ci

      - name: Lint OpenAPI contract
        run: npm run lint:openapi

      - name: Build IoT Docker image
        run: docker build -f Dockerfile -t fit4110/iot-ingestion:lab04 .

      - name: Build Analytics Docker image
        run: docker build -f Dockerfile.analytics -t fit4110/analytics:lab04 .

      - name: Run IoT Docker container
        run: |
          docker run -d --rm \
            --name fit4110-iot-lab04 \
            -p 8000:8000 \
            --env-file .env.example \
            fit4110/iot-ingestion:lab04

      - name: Run Analytics Docker container
        run: |
          docker run -d --rm \
            --name fit4110-analytics-lab04 \
            -p 8001:8001 \
            --env-file .env.analytics.example \
            fit4110/analytics:lab04

      - name: Wait for IoT service health
        run: npx wait-on http://localhost:8000/health --timeout 60000 --interval 5000

      - name: Wait for Analytics service health
        run: npx wait-on http://localhost:8001/api/v1/health --timeout 60000 --interval 5000

      - name: Run Newman tests for IoT
        run: npm run test:local:iot

      - name: Run Newman tests for Analytics
        run: npm run test:local:analytics

      - name: Show IoT container logs on failure
        if: failure()
        run: docker logs fit4110-iot-lab04 || true

      - name: Show Analytics container logs on failure
        if: failure()
        run: docker logs fit4110-analytics-lab04 || true

      - name: Stop containers
        if: always()
        run: |
          docker stop fit4110-iot-lab04 || true
          docker stop fit4110-analytics-lab04 || true

      - name: Upload Newman reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lab04-newman-reports
          path: reports/
